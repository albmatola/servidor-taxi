<!-- Leaflet JS para renderizar o mapa -->
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script>
        // Inicializa o mapa focado em Maputo
        const map = L.map('map').setView([-25.9692, 32.5732], 13);

        // Carrega os blocos de mapa gratuitos do OpenStreetMap
        L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
            attribution: '© OpenStreetMap'
        }).addTo(map);

        let userMarker;
        let latitudeAtual = -25.9692;
        let longitudeAtual = 32.5732;

        // Função para definir ou mover o marcador
        function definirLocalizacao(lat, lon) {
            latitudeAtual = lat;
            longitudeAtual = lon;
            
            if (userMarker) {
                userMarker.setLatLng([lat, lon]);
            } else {
                userMarker = L.marker([lat, lon]).addTo(map)
                    .bindPopup("Estás aqui! 📍")
                    .openPopup();
            }
            map.setView([lat, lon], 16);
        }

        // 1. Tentar geolocalização automática do browser
        if (navigator.geolocation) {
            navigator.geolocation.getCurrentPosition(position => {
                definirLocalizacao(position.coords.latitude, position.coords.longitude);
            }, () => {
                console.log("Geolocalização automática negada ou indisponível. Usa o clique manual.");
            });
        }

        // 2. Permitir definir localização clicando no mapa
        map.on('click', function(e) {
            definirLocalizacao(e.latlng.lat, e.latlng.lng);
        });

        // 3. Enviar o pedido para o servidor via API
        function solicitarTaxi() {
            const phone = document.getElementById('phone').value;
            const dest = document.getElementById('destination').value;
            
            if (!phone) {
                alert("Por favor, introduz o teu número de telefone.");
                return;
            }

            const dadosPedido = {
                telefone: phone,
                destino: dest,
                latitude: latitudeAtual,
                longitude: longitudeAtual
            };

            fetch('/api/pedir', {
                method: 'POST',
                headers: {
                    'Content-Type': 'application/json'
                },
                body: JSON.stringify(dadosPedido)
            })
            .then(response => response.json())
            .then(data => {
                if (data.pedidoId) {
                    alert(`Sucesso! O teu pedido #${data.pedidoId} foi enviado para o servidor.`);
                } else {
                    alert("Erro ao enviar pedido.");
                }
            })
            .catch(error => {
                console.error("Erro na comunicação:", error);
                alert("Não foi possível conectar ao servidor.");
            });
        }
    </script>
