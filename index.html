<!DOCTYPE html>
<html lang="pt">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TaxiExpress - Chamar Táxi</title>
    <!-- CSS do Leaflet para o Mapa -->
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <style>
        body { font-family: Arial, sans-serif; margin: 0; padding: 20px; background-color: #f4f4f9; }
        .container { max-width: 500px; margin: auto; background: white; padding: 20px; border-radius: 10px; box-shadow: 0 4px 10px rgba(0,0,0,0.1); }
        h1 { text-align: center; color: #333; margin-bottom: 5px; }
        p.subtitle { text-align: center; color: #666; margin-top: 0; margin-bottom: 20px; }
        label { font-weight: bold; display: block; margin-top: 10px; }
        input { width: 100%; padding: 10px; margin-top: 5px; box-sizing: border-box; border: 1px solid #ccc; border-radius: 5px; font-size: 16px; }
        
        /* Contentor para garantir que o dropdown de sugestões alinhe perfeitamente com o Input */
        .busca-container { position: relative; width: 100%; }

        /* Estilos do Mapa e sugestões */
        #mapa { height: 250px; width: 100%; margin-top: 15px; border-radius: 8px; border: 1px solid #ddd; }
        .sugestoes-box { background: white; border: 1px solid #ccc; max-height: 150px; overflow-y: auto; position: absolute; width: 100%; z-index: 1000; border-radius: 0 0 5px 5px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); box-sizing: border-box; }
        .sugestao-item { padding: 10px; cursor: pointer; border-bottom: 1px solid #eee; font-size: 14px; }
        .sugestao-item:hover { background-color: #f0f0f0; }

        .btn { width: 100%; background-color: #ffcc00; border: none; padding: 12px; font-size: 18px; font-weight: bold; border-radius: 5px; cursor: pointer; margin-top: 15px; transition: 0.2s; }
        .btn:hover { background-color: #e6b800; }
        .btn:disabled { background-color: #cccccc; cursor: not-allowed; }
        .info-viagem { background: #e9ecef; padding: 10px; border-radius: 5px; margin-top: 15px; font-size: 15px; }
        .status-box { margin-top: 20px; padding: 15px; border-radius: 5px; text-align: center; font-weight: bold; display: none; }
        
        /* Botão estilizado para autorizar o pagamento */
        .btn-pagar { background-color: #28a745; color: white; border: none; padding: 10px 15px; font-size: 16px; font-weight: bold; border-radius: 5px; cursor: pointer; margin-top: 12px; width: 100%; transition: background 0.2s; }
        .btn-pagar:hover { background-color: #218838; }

        /* ==========================================
           💬 ESTILOS DO CHAT INTEGRADO (NOVO)
        ========================================== */
        .chat-container {
            border: 1px solid #ccc;
            border-radius: 8px;
            background: white;
            margin-top: 15px;
            display: none; /* Só abre quando o motorista aceita a corrida */
            flex-direction: column;
            height: 250px;
        }
        .chat-mensagens {
            flex: 1;
            padding: 10px;
            overflow-y: auto;
            display: flex;
            flex-direction: column;
            gap: 8px;
        }
        .balao-msg {
            max-width: 80%;
            padding: 8px 12px;
            border-radius: 15px;
            font-size: 14px;
            line-height: 1.4;
        }
        .minha-msg {
            background-color: #007bff;
            color: white;
            align-self: flex-end;
            border-bottom-right-radius: 2px;
        }
        .outra-msg {
            background-color: #f1f0f0;
            color: #333;
            align-self: flex-start;
            border-bottom-left-radius: 2px;
        }
        .chat-input-area {
            display: flex;
            border-top: 1px solid #ddd;
            padding: 5px;
        }
        .chat-input-area input {
            flex: 1;
            border: none;
            padding: 8px;
            font-size: 14px;
            margin-top: 0;
        }
        .chat-input-area input:focus { outline: none; }
        .btn-enviar {
            background: none;
            border: none;
            font-size: 20px;
            cursor: pointer;
            padding: 0 10px;
        }
    </style>
</head>
<body>

<div class="container">
    <h1>TaxiExpress 🚖</h1>
    <p class="subtitle">Viagens rápidas com pagamento via M-Pesa, e-Mola ou mKesh</p>

    <!-- Campo do Número -->
    <label for="telefone">Teu Número de Telemóvel:</label>
    <input type="tel" id="telefone" placeholder="Ex: 831234567" required maxlength="9">

    <!-- Campo do Destino com Busca Ativa -->
    <label for="destino">Para onde vais?</label>
    <div class="busca-container">
        <input type="text" id="destino" placeholder="Digita o local de destino em Maputo..." oninput="buscarDestinos(this.value)" autocomplete="off">
        <div id="sugestoes" class="sugestoes-box" style="display: none;"></div>
    </div>

    <!-- O Mapa Interativo -->
    <div id="mapa"></div>

    <!-- Informações da Viagem Calculada -->
    <div class="info-viagem" id="info-viagem" style="display: none;">
        📍 <strong>Distância:</strong> <span id="distancia-texto">0.0</span> km<br>
        💰 <strong>Tarifa Estimada:</strong> <span id="tarifa-texto">0</span> MT
    </div>

    <!-- Botão de Solicitação -->
    <button class="btn" id="btn-chamar" onclick="enviarPedido()">Chamar Táxi Agora 🚖</button>

    <!-- Caixa de Estado do Pedido -->
    <div id="status-container" class="status-box"></div>

    <!-- Interface Dinâmica do Chat (NOVO) -->
    <div class="chat-container" id="chat-passageiro">
        <div style="background: #007bff; color: white; padding: 10px; font-weight: bold; border-radius: 8px 8px 0 0; font-size: 14px;">
            💬 Conversa com o Motorista
        </div>
        <div class="chat-mensagens" id="mensagens-box"></div>
        <div class="chat-input-area">
            <input type="text" id="chat-input" placeholder="Escreve ao motorista..." onkeypress="verificarEnter(event)">
            <button class="btn-enviar" onclick="enviarMensagemChat()">✈️</button>
        </div>
    </div>
</div>

<!-- Scripts do Leaflet para o Mapa -->
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

<!-- 1. Carrega o Socket.io de forma nativa a partir do servidor (NOVO) -->
<script src="/socket.io/socket.io.js"></script>

<script>
    // Inicialização da ligação WebSockets com tratamento de segurança
    let socket;
    try {
        socket = io();
        
        // Ouvir mensagens enviadas pelo motorista
        socket.on('mensagem_recebida', (dados) => {
            if (idPedidoAtivo && dados.pedidoId === idPedidoAtivo) {
		// Se quem enviou NÃO foi o cliente, então é uma mensagem do motorista
		if (dados.remetente !== 'cliente') { // ou 'passageiro', dependendo do teu código
            		adicionarMensagemAoEcrã(dados.texto, 'outra');
        	}
            }
        });
    } catch(e) {
        console.warn("Socket.io não disponível ou offline.", e);
    }

    // Configurações de Tarifas de Maputo 🇲🇿
    const TARIFA_BASE = 150; // Taxa de partida (MT)
    const PRECO_POR_KM = 50;  // Valor por quilómetro (MT)

    let mapa;
    let marcadorUsuario;
    let marcadorDestino;
    let rotaLinha;

    let latUsuario = -25.9692; // Centro de Maputo por defeito
    let lonUsuario = 32.5732;
    let latDestino = null;
    let lonDestino = null;
    let distanciaFinalKm = 0;
    let tarifaFinalMt = 0;
    
    let idPedidoAtivo = null; // Guarda o ID da viagem em curso para o Chat

    // 1. Inicializar o Mapa focado em Maputo
    function inicializarMapa() {
        if (typeof L === 'undefined') {
            setTimeout(inicializarMapa, 100);
            return;
        }

        mapa = L.map('mapa').setView([latUsuario, lonUsuario], 13);

        L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
            attribution: '© OpenStreetMap contributors'
        }).addTo(mapa);

        if (navigator.geolocation) {
            navigator.geolocation.getCurrentPosition(pos => {
                latUsuario = pos.coords.latitude;
                lonUsuario = pos.coords.longitude;
                mapa.setView([latUsuario, lonUsuario], 15);

                if (marcadorUsuario) mapa.removeLayer(marcadorUsuario);
                
                marcadorUsuario = L.marker([latUsuario, lonUsuario], {
                    title: "Estás Aqui",
                    draggable: false
                }).addTo(mapa).bindPopup("Estás Aqui 📍").openPopup();
            }, error => {
                console.warn("Acesso à localização negado. Usando centro de Maputo.");
                configurarMarcadorPadrao();
            });
        } else {
            configurarMarcadorPadrao();
        }
    }

    function configurarMarcadorPadrao() {
        marcadorUsuario = L.marker([latUsuario, lonUsuario]).addTo(mapa)
            .bindPopup("Maputo (Centro) 📍").openPopup();
    }

    function validarTelefoneMoçambique(telefone) {
        const regex = /^(82|83|84|85|86|87)\d{7}$/;
        return regex.test(telefone);
    }

    // 2. Procurar locais em Maputo em tempo real (Nominatim API)
    let timeoutBusca;
    function buscarDestinos(texto) {
        clearTimeout(timeoutBusca);
        const sugestoesDiv = document.getElementById('sugestoes');

        if (texto.length < 3) {
            sugestoesDiv.style.display = 'none';
            return;
        }

        timeoutBusca = setTimeout(() => {
            const url = `https://nominatim.openstreetmap.org/search?format=json&q=${encodeURIComponent(texto)}+Maputo&limit=4`;

            fetch(url)
                .then(res => res.json())
                .then(dados => {
                    sugestoesDiv.innerHTML = '';
                    if (!dados || dados.length === 0) {
                        sugestoesDiv.style.display = 'none';
                        return;
                    }

                    dados.forEach(local => {
                        const div = document.createElement('div');
                        div.className = 'sugestao-item';
                        const nomeCurto = local.display_name.split(',').slice(0, 3).join(',');
                        div.innerText = nomeCurto;
                        div.onclick = () => selecionarDestino(local.lat, local.lon, nomeCurto);
                        sugestoesDiv.appendChild(div);
                    });
                    sugestoesDiv.style.display = 'block';
                })
                .catch(err => {
                    console.error("Erro na busca de endereços:", err);
                });
        }, 400);
    }

    // 3. Quando o passageiro clica numa sugestão do Auto-complete
    function selecionarDestino(lat, lon, nome) {
        latDestino = parseFloat(lat);
        lonDestino = parseFloat(lon);
        document.getElementById('destino').value = nome;
        document.getElementById('sugestoes').style.display = 'none';

        const redIcon = L.icon({
            iconUrl: 'https://raw.githubusercontent.com/pointhi/leaflet-color-markers/master/img/marker-icon-red.png',
            shadowUrl: 'https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.3.1/images/marker-shadow.png',
            iconSize: [25, 41],
            iconAnchor: [12, 41],
            popupAnchor: [1, -34],
            shadowSize: [41, 41]
        });

        if (marcadorDestino) {
            marcadorDestino.setLatLng([latDestino, lonDestino]);
        } else {
            marcadorDestino = L.marker([latDestino, lonDestino], { icon: redIcon }).addTo(mapa);
        }
        marcadorDestino.bindPopup("Destino Selecionado 🏁").openPopup();

        if (rotaLinha) {
            rotaLinha.setLatLngs([[latUsuario, lonUsuario], [latDestino, lonDestino]]);
        } else {
            rotaLinha = L.polyline([[latUsuario, lonUsuario], [latDestino, lonDestino]], { color: 'orange', weight: 4 }).addTo(mapa);
        }

        const grupo = new L.featureGroup([marcadorUsuario, marcadorDestino]);
        mapa.fitBounds(grupo.getBounds().pad(0.2));

        calcularTarifaReal();
    }

    function calcularTarifaReal() {
        if (!latDestino) return;

        const R = 6371;
        const dLat = (latDestino - latUsuario) * Math.PI / 180;
        const dLon = (lonDestino - lonUsuario) * Math.PI / 180;
        const a = Math.sin(dLat/2) * Math.sin(dLat/2) +
                  Math.cos(latUsuario * Math.PI / 180) * Math.cos(latDestino * Math.PI / 180) *
                  Math.sin(dLon/2) * Math.sin(dLon/2);
        const c = 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1-a));
        distanciaFinalKm = R * c;

        if (distanciaFinalKm < 0.5) distanciaFinalKm = 0.5;

        tarifaFinalMt = Math.round(TARIFA_BASE + (distanciaFinalKm * PRECO_POR_KM));

        document.getElementById('distancia-texto').innerText = distanciaFinalKm.toFixed(1);
        document.getElementById('tarifa-texto').innerText = tarifaFinalMt;
        document.getElementById('info-viagem').style.display = 'block';
    }

    // 5. Enviar o Pedido real para o Servidor Node.js
    let checkStatusInterval;

    function enviarPedido() {
        const telefone = document.getElementById('telefone').value.trim();
        const destino = document.getElementById('destino').value;

        if (!telefone || !validarTelefoneMoçambique(telefone)) {
            alert("Por favor, introduz um número de telemóvel moçambicano válido (Ex: 831234567, de 9 dígitos).");
            return;
        }

        if (!destino || !latDestino) {
            alert("Por favor, seleciona um destino válido a partir das sugestões.");
            return;
        }

        const dadosPedido = {
            telefone: telefone,
            destino: destino,
            latitude: latUsuario,
            longitude: lonUsuario,
            tarifa: tarifaFinalMt
        };

        const btnChamar = document.getElementById('btn-chamar');
        btnChamar.disabled = true;

        fetch('/api/pedidos', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify(dadosPedido)
        })
        .then(res => {
            if (!res.ok) throw new Error("Erro na comunicação com o servidor.");
            return res.json();
        })
        .then(pedidoCriado => {
            idPedidoAtivo = pedidoCriado.id;
            
            // Regista-se na sala de chat específica do pedido via socket
            if (socket) {
                socket.emit('entrar_chat', { pedidoId: idPedidoAtivo, utilizador: 'passageiro' });
            }

            iniciarMonitorizacaoPedido(idPedidoAtivo);
        })
        .catch(err => {
            alert("Erro ao chamar táxi: " + err.message);
            btnChamar.disabled = false;
        });
    }

    function iniciarMonitorizacaoPedido(id) {
        const statusBox = document.getElementById('status-container');
        statusBox.style.display = "block";

        if (checkStatusInterval) clearInterval(checkStatusInterval);

        checkStatusInterval = setInterval(() => {
            fetch(`/api/pedido/${id}`)
                .then(res => {
                    if (!res.ok) throw new Error("Sem resposta do servidor.");
                    return res.json();
                })
                .then(pedido => {
                    const operadora = obterCarteiraMovel(pedido.telefone);

                    if (pedido.estado === "Pendente") {
                        statusBox.style.backgroundColor = "#ffeeba";
                        statusBox.style.color = "#856404";
                        statusBox.innerText = "🔎 À procura de um motorista por perto...";
                        esconderChat();
                    } 
                    else if (pedido.estado === "Aceite") {
                        statusBox.style.backgroundColor = "#cce5ff";
                        statusBox.style.color = "#004085";
                        statusBox.innerText = "🚖 O motorista aceitou o teu pedido e está a caminho!";
                        mostrarChat(); // Mostra o chat em tempo real com o motorista
                    } 
                    else if (pedido.estado === "Em Viagem") {
                        statusBox.style.backgroundColor = "#ffe8d6";
                        statusBox.style.color = "#a04000";
                        statusBox.innerText = "🗺️ Estás em viagem! Aproveita o percurso.";
                        mostrarChat();
                    } 
                    else if (pedido.estado === "Aguardando_Pagamento") {
                        statusBox.style.backgroundColor = "#f8d7da";
                        statusBox.style.color = "#721c24";
                        statusBox.innerHTML = `
                            💸 Viagem Terminada! <br>
                            Por favor, confirma o pagamento de <strong>${pedido.tarifa} MT</strong> enviado para o teu telemóvel via <strong>${operadora}</strong>.<br>
                            <button class="btn-pagar" onclick="solicitarPin('${pedido.id}', '${operadora}')">Autorizar Débito (Inserir PIN) ✅</button>
                        `;
                        esconderChat(); // Esconde o chat na fase de pagamento para focar na transação
                    } 
                    else if (pedido.estado === "Pago") {
                        statusBox.style.backgroundColor = "#d4edda";
                        statusBox.style.color = "#155724";
                        statusBox.innerHTML = `🎉 Pago com Sucesso via ${operadora}! Obrigado por viajares com o TaxiExpress!`;
                        esconderChat();
                        clearInterval(checkStatusInterval);
                        document.getElementById('btn-chamar').disabled = false;
                        idPedidoAtivo = null;
                    }
                })
                .catch(err => {
                    console.error("Erro ao verificar estado:", err);
                });
        }, 3000);
    }

    // ==========================================
    // ⚙️ FUNÇÕES DO CHAT DE CONVERSA (NOVO)
    // ==========================================
    function mostrarChat() {
        document.getElementById('chat-passageiro').style.display = 'flex';
    }

    function esconderChat() {
        document.getElementById('chat-passageiro').style.display = 'none';
    }

    function verificarEnter(event) {
        if (event.key === 'Enter') {
            enviarMensagemChat();
        }
    }

    function enviarMensagemChat() {
        const input = document.getElementById('chat-input');
        const mensagem = input.value.trim();

        if (mensagem && idPedidoAtivo && socket) {
            // Envia a mensagem via socket
            socket.emit('enviar_mensagem', {
                pedidoId: idPedidoAtivo,
                texto: mensagem,
                remetente: 'passageiro'
            });

            adicionarMensagemAoEcrã(mensagem, 'minha');
            input.value = '';
        }
    }

    function adicionarMensagemAoEcrã(texto, tipo) {
        const box = document.getElementById('mensagens-box');
        const balao = document.createElement('div');
        
        balao.className = `balao-msg ${tipo === 'minha' ? 'minha-msg' : 'outra-msg'}`;
        balao.innerText = texto;
        
        box.appendChild(balao);
        box.scrollTop = box.scrollHeight; // Mantém o scroll no fundo
    }

    // Pergunta o PIN ao utilizador antes de enviar o sinal ao servidor
    function solicitarPin(id, operadora) {
        const pinDigitado = prompt(`[${operadora}] Introduz o teu PIN de 4 dígitos para autorizar o pagamento:`);
        
        if (pinDigitado === null) return; 

        if (pinDigitado.length < 4 || isNaN(pinDigitado)) {
            alert("Erro: O PIN deve conter pelo menos 4 números.");
            return;
        }

        simularPagamento(id, pinDigitado);
    }

    // Função de pagamento atualizada para enviar o PIN para a API
    function simularPagamento(id, pin) {
        fetch(`/api/pedido/${id}/pagar`, {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ pin: pin })
        })
        .then(res => {
            if (!res.ok) throw new Error("Erro ao processar o pagamento.");
            return res.json();
        })
        .then(dados => {
            console.log("Sinal de pagamento com PIN enviado com sucesso!");
        })
        .catch(err => {
            alert("Não foi possível simular o pagamento: " + err.message);
        });
    }

    function obterCarteiraMovel(telefone) {
        if (!telefone) return "Telemóvel";
        const prefixo = telefone.substring(0, 2);
        if (prefixo === "82" || prefixo === "83") return "mKesh";
        if (prefixo === "84" || prefixo === "85") return "M-Pesa";
        if (prefixo === "86" || prefixo === "87") return "e-Mola";
        return "Carteira Móvel";
    }

    window.onload = inicializarMapa;
</script>
</body>
</html>
